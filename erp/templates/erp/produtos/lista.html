<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos - ERP</title>
</head>
<body>
    <h1>Lista de Produtos</h1>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Preço</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for produto in produtos %}
            <tr>
                <td>{{ produto.nome }}</td>
                <td>{{ produto.descricao }}</td>
                <td>{{ produto.preco }}</td>
                <td>
                   <a href="{% url 'atualiza_produto' produto.id %}">Atualizar</a>
                   <a href="{% url 'deleta_produto' produto.id %}">Excluir</a> 
                </td>
            </tr>
            {% endfor %}
        </tbody>
</body>
</html>
