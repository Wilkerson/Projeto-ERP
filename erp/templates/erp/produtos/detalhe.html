<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Produto - ERP</title>
</head>
<body>
    {% if produto %}
        <h1>Detalhes do Produto: {{ produto.nome }}</h1>
        {% if produto.imagem %}
            <img src="{{ produto.imagem.url }}" alt="{{ produto.nome }}" width="400">
        {% endif %}
        <ul>
            <li><strong>Nome:</strong> {{ produto.nome }}</li>
            <li><strong>Descrição:</strong> {{ produto.descricao }}</li>
            <li><strong>Preço:</strong> R$ {{ produto.preco }}</li>
        </ul>
    {% else %}
        <p>Produto não encontrado.</p>
    {% endif %}
</body>
</html>
